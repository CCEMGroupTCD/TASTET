[build-system]
requires = ["setuptools>=64", "setuptools-scm"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "sads"
version = "0.1.0"
description = "Selection by Atomic Density Similarity"
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "matplotlib",
    "ase",
    "dscribe",
    "scikit-learn",
    "tqdm",
]

[project.optional-dependencies]
dev = ["pytest", "ruff"]
docs = [
    "sphinx",
    "sphinx-rtd-theme",
]

[tool.setuptools.packages.find]
include = ["sads*"]
